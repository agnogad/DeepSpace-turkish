split.build = Birimlerin duvarın diğer tarafına taşınması gerekiyor.\nDuvarın her iki tarafına bir[accent]yük kütle sürücüsü][]yerleştirin.\nBirine tıklayın, ardından diğerine tıklayarak bağlayın.
split.container = Güçlendirilmiş container gibi, birimler de[accent]yük kütle sürücüleri[]ile taşınabilir.\nBirim fabrikasını yük kütle sürücüsünün yanına yerleştirerek birimleri yükleyin, ardından duvarın diğer tarafına taşıyarak düşman üssünü yok edin.

