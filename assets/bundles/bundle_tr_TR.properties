hints.doc.nuclearGuidance = 《Nötron Endüstrisi Güvenli Üretim Yönetmeliği》

hints.nuclearEnergyGuidance = [lightgray]Nötron enerjisine sahip tesislerin özel bir enerji besleme modu vardır, nötron enerjisi açıklaması ve kuralları için lütfen [accent]《Nötron Endüstrisi Güvenli Üretim Yönetmeliği》[lightgray] dosyasına bakın

hints.spliceStructure-0 = [lightgray]Bazı binalar yakınındaki diğer binalarla birleştirilebilir, genellikle [accent]"birleştirildiklerinde"[lightgray] kenarları değişir ve bütün görünür, bazı binaların belirli bir birleştirme biçimi vardır, genellikle [accent]yüz yüze yerleştirilen[lightgray] iki birleştirilebilir bina yapı birimi olarak kabul edilir.
hints.spliceStructure-1 = [lightgray]Birleştirilmiş yapılar özel özellikler getirir, binaların [accent]ayrıntılı bilgilerinde[lightgray] açıklama görebilirsiniz. Birleştirilmiş yapıların [accent]maksimum yapı boyutu[lightgray] sınırı olduğunu unutmayın, bu aralığı aştığınızda yapı kesilebilir veya geçersiz olabilir, bu durum duruma göre değişir.\n[gray]Bu kılavuzda tamamlanacak hedef yok, biliyorsanız lütfen bu ipucunu manuel olarak atlayın

hints.matrixCorePlaced-0 = [accent]Matrix Merkez Sunucusu[lightgray] bir Matrix ağının çekirdek cihazıdır, bir Matrix ağında [accent]yalnızca bir[lightgray] Merkez Sunucusu olabilir.\nBir Kontrol Merkezi yerleştirdikten sonra, [accent]Matrix Köprüsü[lightgray] kullanarak Matrix ağındaki cihazları bağlayın, etkin bir Matrix ağının最小 birimi bir çekirdek ve [accent]geçerli bir Enerji Yöneticisi[lightgray] Matrix Köprüsü aracılığıyla bağlıdır.
hints.matrixCorePlaced-1 = [lightgray]Gösterimdeki gibi, bir [accent]Enerji Yöneticisi[lightgray] yerleştirin, Matrix Köprüsü ile benzer şekilde Merkez Sunucusuna bağlayın ve [accent]Elektrik Arayüzü[lightgray] ile Enerji Yöneticisine enerji sağlayın.
hints.matrixUsageTip-0 = [lightgray]Bir Matrix ağı birden fazla cihazı bağlayabilir ve her cihaz [accent]topoloji alanı[lightgray] kaplar, topoloji alanı dolduğunda yeni cihaz eklemek ağı geçersiz kılar.\nAyrıca çoğu cihaz Merkeze istek gönderir, Matrix Merkez Sunucusu'nun [accent]işlem gücü[lightgray] sınırlıdır, bu ağınızın aynı anda kaç görev isteğini işleyebileceğini belirler.
hints.matrixUsageTip-1 = [lightgray]Merkez Sunucusu çevresine bileşenler kurarak ağın [accent]maksimum topoloji alanı kapasitesini[lightgray] ve [accent]çekirdek işlem gücünü[lightgray] artırabilirsiniz, gösterimdeki gibi.\n[gray]Bu kılavuzda tamamlanacak hedef yok, biliyorsanız lütfen bu ipucunu manuel olarak atlayın
hints.matrixGridPlaced-0 = [accent]Matrix Kafesi[lightgray] Matrix ağındaki en verimli [accent]lojistik IO yönetim cihazıdır[lightgray], kafes çerçeveleriyle bağlanarak [accent]kapalı bir alan[lightgray] oluşturur, alan içinde ağ IO noktaları ve container işaretleri ayarlanabilir.
hints.matrixGridPlaced-1 = [lightgray]Etkili bir Matrix Kafesi kurmak için birkaç [accent]Kafes Çerçevesi[lightgray] yerleştirmeniz, Kafes Denetleyicisiyle çapraz şekilde bire bir bağlanarak kapalı bir alan oluşturmanız gerekir, gösterimdeki gibi.\nBir kafes kenarının bağlanabileceği çerçeve sayısı kullandığınız [accent]Kafes Denetleyicisi[lightgray]ne bağlıdır, temel maksimum bağlantı sayısı 8'dir.
hints.matrixGridActivating-0 = [lightgray]Matrix Kafesi, kapalı alanı içindeki [accent]geçerli container'lar[lightgray] ve [accent]IO port'ları[lightgray] için yüksek zeki lojistik dağıtımı yapılandırmak üzere yapılandırılabilir.
hints.matrixGridActivating-1 = [lightgray]Matrix Kafesi kurulduktan sonra, kapalı alan içindeki geçerli container'lar ve IO port'lar yapılandırılabilir, örneğin kapalı alan içine bir [accent]Genel IO Port'u[lightgray] yerleştirin, ardından önce [accent]Kafes Denetleyicisi[lightgray]ni seçin, ardından IO port'a tıklayarak yapılandırma panelini açın.\nAynı işlem alandaki geçerli container'lar için de geçerlidir, örneğin çekirdek, depo vb. için de doğru şekilde yapılandırma paneli açılabilir.
hints.matrixGridActivating-2 = [lightgray]Yapılandırma panelini açtıktan sonra, IO yapılandırmasını paneldeki düğmelerle yapabilirsiniz, tek yapılandırma hedefini tamamlamak için [accent]"Onayla"[]ya tıklayın, hiçbir öğe ayarlamazsanız yapılandırma temizlenir ve kaldırılır\nPanel hakkında daha fazla bilgi için paneldeki [accent]"i"[] düğmesini tıklayarak yardımı açın.