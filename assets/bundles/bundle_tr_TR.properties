sector.groundZero.description = Bu en iyi başlangıç noktasıdır. Düşman tehdidi düşük, kaynaklar kıt.\nKurşun ve bakır toplamaya çalışın.\nArdından ilerleyin.
sector.frozenForest.description = Dağlara yakın olsa bile sporlar yayılmaya devam ediyor. Soğuk hava onları sonsuza kadar engelleyemez.\n\nElektrik keşfetmeye başlayın. Termik jeneratörler inşa edin. Tamircileri kullanmayı öğrenin.
sector.saltFlats.description = Çölün kenarında tuzlu çorak, kaynaklar kıt.\n\nDüşman burada kaynak depolama alanı oluşturmuş. Çekirdeklerini yok edin, hiçbir şey bırakmayın.
sector.crateredBattleground.description = Eski savaşların kalıntısı olan bu kraterde su birikmiş. Alanı geri alın. Kum toplayın. Metaglass eritin. Kuledeki matkapları soğutmak için su pompası yapın.
sector.ruinousShores.description = Vahadan geçince kıyıya ulaşırsınız.\nBurada bir zamanlar bir kıyı savunma hattı vardı, ama artık çok az şey kaldı.\nBazı temel savunma binaları hala sağlam, geri kalan her şey harabe halinde.\n\nDışarı doğru genişleyin ve teknolojiyi araştırın.
sector.stainedMountains.description = İç bölgelere doğru dağlara girersiniz, burası henüz sporlarla kirlenmemiş.\nDüşman güçleri daha güçlü, seçkin birliklerine nefes aldırmayın.\n\nBu bölgede bol miktarda titanyum var, onu çıkarın ve kullanın.
sector.overgrowth.description = Burası sporların ilk kaynağına yakın, bu yüzden çılgınca büyüyebilmiş.\n\nDüşman burada bir karakol kurmuş, onu yok etmek için Bıçak birimleri inşa edin.
sector.tarFields.description = Petrol üretim bölgesinin kenarında, dağlar ve çöl arasında. Petrol rezervlerine sahip ender bölgelerden biri.\nBurada her şey harabe halinde olsa da yakınlarda tehlikeli düşman birimleri var. Onları hafife almayın.\n\n[lightgray]Petrol işleme teknolojisini araştırmak için elinizden geleni yapın.
sector.desolateRift.description = Çok tehlikeli bir bölge, kaynaklar zengin ama alan dar, düşmanlar da çok tehlikeli.\n\nHızla gelişin ve savunun, düşman saldırıları arasındaki uzun aralıklara aldanmayın.
sector.nuclearComplex.description = Bir zamanlar toryum üretmek ve işlemek için kullanılan tesis, şimdi harabe halinde.\nBurada çok sayıda düşman var, sürekli saldırgan arıyorlar.\n\n[lightgray]Toryumu ve çeşitli kullanımlarını araştırın.
sector.fungalPass.description = Bir yanda yüksek dağlar, diğer yanda spor kaplı ovlar.\nBurada küçük bir düşman keşif üssü var, onu yok edin.\n\nBıçak ve Solucan birimlerini kullanın, düşman çekirdeklerini yok edin.
sector.biomassFacility.description = Sporların kökeni, sporları araştıran ve üreten orijinal tesis.\n\n[lightgray]Bu tesis yok edildikten sonra sporlar serbest kaldı, yerel ekosistem bu yabancı türü tamamen savunamaz.\nİçindeki teknolojiyi araştırın, yakıt ve plastik üretimi için spor yetiştirin.
sector.windsweptIslands.description = Kıyı hattının ötesinde bu ada zinciri uzanıyor. Kayıtlara göre burada [accent]Plastik Çelik[] üreten binalar vardı.\n\nDüşman deniz kuvvetlerine karşı direnin, adalarda üs kurun, üretim binalarını araştırın.
sector.extractionOutpost.description = Uzak bir karakol, düşman diğer bölgelere kaynak fırlatmak için burayı inşa etmiş.\n\nBölgeler arası ulaşım teknolojisi daha ileri fetih için çok önemli. Bu üssü yok edin, fırlatma rampasını araştırın.
sector.impact0078.description = Bu galaksiye giren ilk yıldız gemisinin kalıntıları burada kaldı.\n\nKalıntılardan kullanışlı malzemeleri kurtarmaya çalışın ve teknolojiyi araştırın.
sector.planetaryTerminal.description = Nihai hedef.\n\nBu kıyı üssünde çekirdekleri diğer gezegenlere fırlatabilen bir tesis var, savunma çok sıkı.\n\nDeniz birimleri üretin, düşmanları hızla yok edin, fırlatma binalarını araştırın.
sector.coastline.description = Bu konumda deniz birimi teknolojisinin kalıntıları bulundu. Düşman saldırısını püskürtün, bu bölgeyi ele geçirin ve teknolojiyi araştırın.
sector.navalFortress.description = Düşman uzak ve doğal olarak savunulan bir adada üs kurmuş. Bu karakolu yok edin, gelişmiş deniz teknolojisi edinin ve araştırın.
sector.facility32m.description = Bu bölge patlayıcı üretim tesisinin çürüyen kalıntılarını içeriyor.\n\nBu alanı ele geçirin. Patlama Mikserini araştırın. Taret mühimmatı olarak kullanmak için Patlama Bileşiği üretin.
sector.taintedWoods.description = [gray][opsiyonel hedef][]\nBol petrol rezervleri, spor büyümesi nedeniyle geçilmesi zor büyük fungal kütleler içeren bu bölge.\n\nKaynaklarını kullanarak Plastanium üretin. Düşmana karşı direnin.
sector.sunkenPier.description = [gray][opsiyonel hedef][]\nBir zamanlar denizaşırı petrol platformu olan bu tesis uzun süredir bakımsız kalmış.\n\nYüksek miktarda düşman deniz birimi tespit edildi. Birden fazla yönden saldırılara hazırlıklı olun.
sector.atolls.description = [gray][opsiyonel hedef][]\nBu konumda birden fazla düşman deniz üssü tespit edildi.\n\nKara birliklerini saldırı pozisyonlarına taşımak için Mega yük birimlerini kullanın. Çevre karakollarını yok etmek için deniz birimleri inşa edin.
sector.frontier.description = Burada küçük bir düşman karakolu tespit edildi.\n\nKaynakları daha verimli hasat etmek için Mono birimleri inşa edin. Daha güçlü birimler inşa etmek için Katkılı Yeniden Yapılandırıcıyı kullanın.
sector.infestedCanyons.description = Dağların ötesinde kıvrımlı bir nehir vadisi uzanıyor, şimdi spor yosunlarıyla kaplı.\n\nDüşman saldırısına karşı direnin. Deniz birimleri inşa edin. Tüm düşman çekirdeklerini yok edin.
sector.testingGrounds.description = [gray][opsiyonel hedef][]\nAskeri projeler için test alanı olarak kullanılan kraterlerle dolu çöl vadisi.\n\nSu eksikliği nedeniyle bu konumda varlık oluşturmak zor olabilir. Birden fazla yönden saldırılara hazırlıklı olun.
sector.perilousHarbor.description = Bu tehlikeli kıyı bölgesinde birden fazla düşman üssü kurulmuş.\n\nDeniz birimleri inşa edin ve kalelerini ez.
sector.weatheredChannels.description = [gray][opsiyonel hedef][]\nBu kanal sistemi bol kaynak barındırıyor. Çekirdeğinizi indirin. Kaynakları almak için düşman dalgalarına direnin.\n\nDüşman altyapınıza saldırmak için birden fazla yol kullanacak. Olası pusuya dikkat edin ve buna göre savunun.
sector.mycelialBastion.description = Bu tahkim edilmiş kompleksi fungal bölgelerin derinliklerinde, gelişmiş eklem bacaklı birimlerle komşu bölgelere tehdit oluşturuyor.\n\nKomplekse saldırın. İçindeki teknolojiyi edinin. Duvarlardan geçebilen birimler kullanın.
sector.littoralShipyard.description = Merkezi denizin uzak kesimlerinde yer alan bu deniz üretim tesisi, gelişmiş birimler inşa etme teknolojisi içerir.\n\nBu tesisi yok edin ve son hedefi tamamlamada yardımcı olmak için teknolojisini kullanın.

