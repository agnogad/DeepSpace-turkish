onset.power = Plazma delgecine[accent]enerji[]sağlamak için :beam-node: [accent]Lazer Düğümü[]yerleştirin.\nTürbin yoğunlaştırıcıyla plazma delgicisini birbirine bağlayacaktır.
onset.ducts = Plazma delgicisinin çıkardığı mineralleri çekirdeğe taşımak için :duct: [accent]Eşya Borusu[]yerleştirin.\n\nSürekli eşya borusu yerleştirmek için tıklayıp sürükleyin.\nDöndürmek için[accent]fare tekerleğini[]kaydırın.
onset.ducts.mobile = Plazma delgicisinin çıkardığı mineralleri çekirdeğe taşımak için :duct: [accent]Eşya Borusu[]yerleştirin.\n\nBir saniye basılı tutun, ardından sürekli eşya borusu yerleştirmek için sürükleyin.
onset.moremine = Madenciliği genişletin.\nDaha fazla plazma delgeci yerleştirin ve lazer düğümleriyle eşya borularını kullanarak düzgün çalışmalarını sağlayın.\n200 berilyum çıkarın.
onset.graphite = Daha ileri binalar inşa etmek için :graphite: [accent]grafit[]e ihtiyacınız var.\nGrafiti plazma delgicisiyle çıkarın.
onset.research2 = [accent]Fabrikaları[]araştırmaya başlayın.\n:cliff-crusher: [accent]Duvar Kırıcı[]ve :silicon-arc-furnace: [accent]Ark Fırını[]nı araştırın.
onset.arcfurnace = Ark fırını :sand: [accent]kum[]ve :graphite: [accent]grafit[]ile :silicon: [accent]silikon[]üretir.\n[accent]Enerji[]de gerektirir.
