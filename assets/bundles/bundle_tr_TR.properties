sector.onset.description = Kaynak toplayın, üretimi otomatikleştirmek için teknolojiyi araştırın.\nSaldırıya başlayın.
sector.aegis.description = Bu bölgede tungsten yatakları var.\n[accent]Darbe Matkabı[]nı araştırarak tungsten çıkarın ve düşman üssünü yok edin.
sector.lake.description = Bu bölgedeki magma gölü çoğu birimin hareketini kısıtlıyor, askıda birimler tek seçenek.\nHızla [accent]Uzay Gemisi Fabrikası[]nı araştırın ve bir [accent]Kopya[] üretin.
sector.intersect.description = Tarama, bu bölgenin inişten hemen sonra çok yönlü saldırıya uğrayacağını gösteriyor.\nHızla savunma kurun ve mümkün olan en kısa sürede genişleyin.\n[accent]Mek robot[] birimleri buradaki engebeli arazide kullanılabilir.
sector.atlas.description = Bu bölge çeşitli araziler içeriyor, etkili saldırı için çoklu birlik koordinasyonu gerekiyor.\nBurada bulunan daha güçlü düşman üslerini yok etmek için gelişmiş birimler gerekiyor.\n[accent]Elektrolizör[] ve [accent]Tank Yeniden Yapılandırıcı[]yı araştırın.
sector.split.description = Bu bölgede düşman sayısı çok az, yeni ulaşım teknolojilerini test etmek için ideal.
sector.basin.description = Bu bölgede çok sayıda düşman tespit edildi.\nHızla birimler üretin ve düşman çekirdeğini ele geçirerek burada kök salın.
sector.marsh.description = Bu bölgede bol miktarda aromatik yağ var ama püskürtücü sayısı sınırlı.\n[accent]Kimyasal Yanma Odası[] ile elektrik üretin.
sector.peaks.description = Bu bölgenin dağlık arazisi çoğu birimi işe yaramaz kılıyor. Hava birimleri gerekli.\nDüşman hava savunmasına dikkat edin. Mühimmat tedarikini kesmeye çalışın.
sector.ravine.description = Burası düşmanın önemli bir ulaşım yolu. Bölgede düşman çekirdeği tespit edilmedi ama çeşitli düşman güçleri bekleniyor.\nHızla [accent]Dev Dalga Alaşımı[] üretin ve [accent]Sefillik[] taretleri inşa edin.
sector.caldera-erekir.description = Bu bölgedeki kaynaklar birden fazla adaya dağılmış.\nAraştırın ve İHA taşımacılığını konuşlandırın.
sector.stronghold.description = Bu bölgedeki düşman üssü bol miktarda [accent]toryum[] muhafaza ediyor.\nOnu kullanarak gelişmiş birimler ve taretler araştırın.
sector.crevice.description = Bu bölgede düşman saldırıları çok şiddetli.\nHayatta kalmak için hızla [accent]Karbür[] ve [accent]Piroliz Jeneratörü[] araştırın.
sector.siege.description = Bu bölgedeki iki paralel vadi sizi çift hatlı savaşmak zorunda bırakıyor.\nDaha güçlü tank birimleri üretmek için [accent]Siyanür[] araştırın.\nUYARI: Düşman uzun menzil füze kuleleri tespit edildi. Füzeler yere düşmeden önce engellenebilir.
sector.crossroads.description = Bu bölgedeki düşman üsleri farklı arazilerde kurulmuş. Saldırmak için çeşitli birimler araştırın.\nBazı düşman üslerinin kalkanları var. Elektrik tedarikini kesmeye çalışın.
sector.karst.description = Bu bölge kaynak bakımından zengin ama düşman hemen saldırıya başlayacak.\nKaynakları iyi kullanın ve [accent]Faz Dokusu[]nu araştırın.
sector.origin.description = Son bölge, düşman sayısı aşırı çok.\nTüm teknolojiler araştırıldı, sadece tüm düşman üslerini yok edin.

