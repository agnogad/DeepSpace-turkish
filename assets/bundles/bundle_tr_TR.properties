onset.walls = [accent]Duvar[]binaları hasardan korur.\nTaretlerin çevresine :beryllium-wall:[accent]berilyum duvar[]yerleştirin.
onset.enemies = Düşman geliyor, savunmaya hazırlan.
onset.defenses = [accent]Savunma kur：[lightgray] {0}
onset.attack = Düşman üssü çok kırılgan. Karşı saldırı başlat.
onset.cores = [accent]Çekirdek bölgesi[] döşemeleri üzerine yeni çekirdekler inşa edebilirsiniz.\nYeni çekirdekler bir ön üs gibi işlev görür ve diğer çekirdeklerle kaynak depolarını paylaşır.\n:core-bastion: Bir :core-bastion: Kale çekirdeği[] yerleştirin.
