onset.fabricator = Haritayı keşfetmek, savunmak ve saldırmak için[accent]birimler[]kullanın.\nAraştırın ve :tank-fabricator: [accent]Tank Fabrikası][]yerleştirin.
onset.makeunit = Birim üretin.\nÜretmek için gereken kaynakları görmek için "?" düğmesine tıklayın.
onset.turrets = Birimlerle savunma etkilidir ama[accent]taretleri[]akıllıca kullanmak daha iyi savunma sağlar.\n:breach: [accent]Yırtılma[]yerleştirin.\nTaretler :beryllium: [accent]mühimmat[]ile beslenmelidir.
