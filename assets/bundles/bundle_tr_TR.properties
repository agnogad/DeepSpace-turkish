block.duct-bridge.description = Herhangi bir arazi veya bina üzerinden eşya taşır.
block.duct-unloader.description = Arkasındaki binalardan belirli eşyaları boşaltır. Çekirdekten boşaltamaz.
block.underflow-duct.description = Taşma borusunun tersi. İki yön de tıkanırsa ileri taşır.
block.reinforced-liquid-junction.description = İki çapraz güçlendirilmiş borunun köprüsü görevi görür.
block.surge-conveyor.description = Eşyaları paketleyerek taşır. Enerjiyle hızlandırılabilir. Enerji iletebilir.
block.surge-router.description = Alaşım konveyöründeki eşyaları diğer 3 yöne eşit olarak dağıtır. Enerjiyle hızlandırılabilir. Enerji iletebilir.
block.unit-cargo-loader.description = Kargo İHA'ları inşa eder. İHA'lar otomatik olarak talep noktalarına eşya dağıtır.
block.unit-cargo-unload-point.description = Kargo İHA'ları için boşaltma noktası görevi görür. Talep edilen eşyaları kabul eder.
block.beam-node.description = Birbirine dik diğer düğümlere enerji iletir. Az miktarda enerji depolar.
block.beam-tower.description = Birbirine dik diğer düğümlere enerji iletir. Çok miktarda enerji depolar. Bağlantı mesafesi uzak.
block.beam-link.description = Uzun mesafeli enerji iletimi için kullanılır.\nYalnızca bitişik binalara veya başka bir lazer bağlantısına bağlanabilir.
block.turbine-condenser.description = Püskürtücülerin üzerine yerleştirildiğinde enerji üretir. Aynı zamanda az miktarda su üretir.
block.chemical-combustion-chamber.description = Aromatik yağ ve ozon kullanarak enerji üretir.
block.pyrolysis-generator.description = Cüruf ısısını kullanarak aromatik yağı piroliz ederek büyük miktarda enerji üretir. Aynı zamanda su üretir.
block.flux-reactor.description = ısıtıldığında büyük miktarda enerji üretir. Stabilizatör olarak siyanür gerektirir. Enerji çıktısı ve siyanür talebi ısı girişiyle orantılıdır.\nısıtıldığında yeterli siyanür sağlanmazsa patlar.
block.neoplasia-reactor.description = Aromatik yağ, su ve faz dokusu kullanarak büyük miktarda enerji üretir. Aynı zamanda ısı ve tehlikeli tümör sıvısı üretir.\nTümör sıvısı borulardan reaktörden çıkarılmazsa şiddetle patlar.
block.build-tower.description = Menzil içindeki binaları otomatik olarak yeniden inşa eder ve diğer birimler inşaat yaparken yardımcı olur.
block.regen-projector.description = Menzil içindeki dost binaları yavaşça onarır. Hidrojen gerektirir.
block.reinforced-container.description = Çeşitli eşya türlerini az miktarda depolar. Yükleyicilerle eşya boşaltılabilir. Çekirdek depolama kapasitesini artırmaz.
block.reinforced-vault.description = Çeşitli eşya türlerini büyük miktarda depolar. Yükleyicilerle eşya boşaltılabilir. Çekirdek depolama kapasitesini artırmaz.
block.tank-fabricator.description = Tank birimleri üretir. Üretilen birimler doğrudan savaşa gönderilebilir veya yükseltme için yeniden yapılandırma tesislerine gönderilebilir.
block.ship-fabricator.description = Uzay gemisi birimleri üretir. Üretilen birimler doğrudan savaşa gönderilebilir veya yükseltme için yeniden yapılandırma tesislerine gönderilebilir.
block.mech-fabricator.description = Mek robot birimleri üretir. Üretilen birimler doğrudan savaşa gönderilebilir veya yükseltme için yeniden yapılandırma tesislerine gönderilebilir.
block.tank-assembler.description = Gelen bina ve birimlerden büyük tanklar monte eder. Çıktı seviyesini artırmak için temel montaj tesisi modülleri eklenebilir.
block.ship-assembler.description = Gelen bina ve birimlerden büyük uzay gemileri monte eder. Çıktı seviyesini artırmak için temel montaj tesisi modülleri eklenebilir.
block.mech-assembler.description = Gelen bina ve birimlerden büyük mek robotları monte eder. Çıktı seviyesini artırmak için temel montaj tesisi modülleri eklenebilir.
block.tank-refabricator.description = Gelen tank birimlerini ikinci seviyeye yükseltir.
block.ship-refabricator.description = Gelen uzay gemisi birimlerini ikinci seviyeye yükseltir.
block.mech-refabricator.description = Gelen mek robot birimlerini ikinci seviyeye yükseltir.
block.prime-refabricator.description = Gelen birimleri üçüncü seviyeye yükseltir.
block.basic-assembler-module.description = İnşaat sınırının yanına yerleştirildiğinde çıktı seviyesini artırır. Enerji gerektirir. Yük girişi olarak kullanılabilir.
block.small-deconstructor.description = Binaları ve birimleri yıkar, %100 kaynak iade eder.
block.reinforced-payload-conveyor.description = Yükleri ileri taşır.
block.reinforced-payload-router.description = Yükleri 3 yöne sırayla dağıtır. Yük ayarlanırken sıralayıcı olarak kullanılabilir.
block.payload-mass-driver.description = Uzun mesafe yük taşıma binası. Bağlı diğer yük kütle sürücülerine yük fırlatır.
block.large-payload-mass-driver.description = Uzun mesafe yük taşıma binası. Bağlı diğer büyük yük kütle sürücülerine yük fırlatır.
block.unit-repair-tower.description = Yakınındaki tüm birimleri onarır. Ozon gerektirir.
block.radar.description = Menzil içindeki araziyi ve düşman birimleri ile binaları kademeli olarak keşfeder, enerji desteği gerektirir.
block.shockwave-tower.description = Menzil içindeki düşman mermilerini bozar ve yok eder. Siyanür gerektirir.
block.canvas.description = Önceden tanımlanmış bir paletle çizilmiş görüntüleri gösterir. Manuel olarak düzenlenebilir.
block.large-canvas.description = Önceden tanımlanmış bir paletle basit bir görüntü gösterir. Düzenlenebilir.

unit.dagger.description = Düşmanlara standart mermiler fırlatır.
unit.mace.description = Düşmanlara alev püskürtür.
unit.fortress.description = Düşman kara birimlerine uzun menzil topçu ateşi fırlatır.
unit.scepter.description = Düşmanlara hızla yüklü mermiler fırlatır.
unit.reign.description = Düşmanlara hızla büyük delici mermiler fırlatır.
unit.nova.description = Düşmanlara lazer mermisi fırlatır ve dost binaları onarır. Güçlendirebilir.
unit.pulsar.description = Düşmanlara ark fırlatır ve dost binaları onarır. Güçlendirebilir.
unit.quasar.description = Düşmanlara delici lazer ışını fırlatır ve dost binaları onarır. Güçlendirebilir. Kalkanı vardır.
unit.vela.description = Düşmanlara devasa sürekli lazer ışını fırlatır, yangın çıkarır ve dost binaları onarır. Güçlendirebilir.
unit.corvus.description = Devasa patlayıcı lazer ışını fırlatır, düşmanları yok eder ve dost binaları onarır. Çoğu araziyi aşabilir.
unit.crawler.description = Düşmanlara dalar ve kendini imha eder, geniş alanda patlama yapar.
unit.atrax.description = Düşman kara hedeflerine zayıflatıcı cüruf sıvısı topu fırlatır. Çoğu araziyi aşabilir.
unit.spiroct.description = Düşmanlara zayıf lazer ışını fırlatır ve bu süreçte kendini onarır. Çoğu araziyi aşabilir.
unit.arkyid.description = Düşmanlara büyük lazer ışını fırlatır ve bu süreçte kendini onarır. Çoğu araziyi aşabilir.
unit.toxopid.description = Düşmanlara büyük yüklü saçılma mermileri ve delici lazer fırlatır. Çoğu araziyi aşabilir.
unit.flare.description = Düşmanlara standart mermiler fırlatır.
unit.horizon.description = Altındaki düşman kara birimlerine bombalar atar.
unit.zenith.description = Düşmanlara birden fazla füze fırlatır.
unit.antumbra.description = Düşmanlara sık mermiler fırlatır.
unit.eclipse.description = Düşmanlara delici lazer ve patlayıcı mermiler fırlatır.
unit.mono.description = Otomatik olarak bakır ve kurşun çıkarır ve bunları çekirdeğe koyar.
unit.poly.description = Yok edilen binaları otomatik olarak yeniden inşa eder ve diğer birimlerin inşaatına yardımcı olur.
unit.mega.description = Hasar görmüş binaları otomatik olarak onarır. Bina ve küçük kara birimlerini taşıyabilir.
unit.quad.description = Kara hedeflere plazma bombaları atar, dost binaları onarır ve düşmanları yok eder. Orta boyutlu kara birimlerini taşıyabilir.
unit.oct.description = Yenilenme kalkanıyla yakınındaki dost birimleri korur. Çoğu kara birimini taşıyabilir.
unit.risso.description = Düşmanlara bir dizi füze ve mermi fırlatır.
unit.minke.description = Düşmanlara mermiler ve standart mermiler fırlatır.
unit.bryde.description = Düşmanlara uzun menzil mermileri ve füzeler fırlatır.
unit.sei.description = Düşmanlara bir dizi füze ve zırh delici mermiler fırlatır.
unit.omura.description = Düşmanlara uzun menzil delici ray silahı fırlatır.

