onset.commandmode = [accent]shift[]tuşunu basılı tutarak[accent]komut moduna[]girin.\n[accent]Fare sol tuşu][]basılı tutarak birimleri seçin.\n[accent]Sağ tık[]seçili birimleri hareket ettirmek veya saldırmak için komut verir.
onset.commandmode.mobile = [accent]Komut[]düğmesine tıklayarak[accent]komut moduna[]girin.\n[accent]Basılı tutarak ve sürükleyerek[] birimleri seçin.\n[accent]Tıklayın[]seçili birimleri hareket ettirmek veya saldırmak için komut verir.
aegis.tungsten = Tungsten[accent]darbe matkabı[]ile çıkarılabilir.\nBu yapı[accent]su[]ve[accent]enerji[]gerektirir.

split.pickup = Çekirdek birimleri bazı binaları alabilir.\n[accent]Bu güçlendirilmiş containerı[]alın ve[accent]yük yükleyici[]e yerleştirin.\n(Varsayılan olarak "[" yükü almak, "]" yükü bırakmak için kısayol tuşları)
